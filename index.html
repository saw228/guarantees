<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Main</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    /* Верхнее меню */
    #top-menu {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #333;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 9999;
      justify-content: center;
    }

    #top-menu button {
      margin-right: 10px;
      padding: 8px 16px;
      font-size: 16px;
      color: white;
      background: #444;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #top-menu button:hover,
    #top-menu button.active {
      background-color: #008cba;
    }

    /* Контейнер iframe */
    #iframe-container {
      position: absolute;
      top: 50px;
      bottom: 0;
      left: 0;
      right: 0;
      overflow: hidden;
      background-color: #f0f0f0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
      /* скрываем по умолчанию */
    }

    iframe.active {
      display: block;
      /* показываем активный iframe */
    }
  </style>
</head>

<body>

  <!-- Верхнее меню -->
  <div id="top-menu">

    <button data-target="site2">СМС 900</button>
    <button data-target="site3">УРАЛСИБ</button>
    <button data-target="site1" class="active">ОТМЕНА СО СБЕРА</button>
    <button data-target="site5">ЧЕКИ</button>
    <button data-target="site6">ПЕРЕВОД 200К</button>
    <button data-target="site7">ДЕКЛАРАЦИЯ</button>


  </div>

  <!-- Все iframe загружены сразу -->
  <div id="iframe-container">
    <iframe id="site1" class="active" src="site1/index.html"></iframe>
    <iframe id="site2" src="site2/index.html"></iframe>
    <iframe id="site3" src="site3/index.html"></iframe>
    <iframe id="site5" src="site5/index.html"></iframe>
    <iframe id="site6" src="site6/index.html"></iframe>
    <iframe id="site7" src="site7/index.html"></iframe>
  </div>

  <script>
    const buttons = document.querySelectorAll('#top-menu button');

    const iframes = {
      site1: document.getElementById('site1'),
      site2: document.getElementById('site2'),
      site3: document.getElementById('site3'),
      site5: document.getElementById('site5'),
      site6: document.getElementById('site6'),
      site7: document.getElementById('site7')
    };

    let savedSite = localStorage.getItem('activeSite') || 'site1';

    function activateSite(siteKey) {
      buttons.forEach(b => b.classList.remove('active'));
      Object.values(iframes).forEach(frame => frame.classList.remove('active'));

      const activeButton = document.querySelector(`[data-target="${siteKey}"]`);
      if (activeButton) activeButton.classList.add('active');

      if (iframes[siteKey]) {
        iframes[siteKey].classList.add('active');
      }

      localStorage.setItem('activeSite', siteKey);
    }

    activateSite(savedSite);

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        activateSite(target);
      });
    });
  </script>

</body>

</html>
