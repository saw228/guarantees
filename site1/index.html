<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Переключатель</title>
  <style>
    body {
      margin: 0;
      background: #111318;
      font-family: Inter, Arial, sans-serif;
    }

    .switcher {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 14px;
      background: rgba(20, 22, 28, 0.9);
    }

    .switcher button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      background: #1f2430;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .switcher button.active {
      background: #fff;
      color: #111318;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="switcher">
    <button id="btnOld" class="active" onclick="switchPage('old')">Old</button>
    <button id="btnNew" onclick="switchPage('new')">New</button>
  </div>

  <iframe id="pageFrame" src="indexOld.html"></iframe>

  <script>
    function switchPage(type) {
      const frame = document.getElementById('pageFrame');
      const btnOld = document.getElementById('btnOld');
      const btnNew = document.getElementById('btnNew');

      if (type === 'old') {
        frame.src = 'indexOld.html';
        btnOld.classList.add('active');
        btnNew.classList.remove('active');
      } else {
        frame.src = 'indexNew.html';
        btnNew.classList.add('active');
        btnOld.classList.remove('active');
      }
    }
  </script>

</body>
</html>
